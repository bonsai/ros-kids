<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>捨てロボット犬を拾った話 — テキストゲーム</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Fira+Code:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:#1e1e2e;color:#cdd6f4;
  min-height:100vh;display:flex;flex-direction:column;
  background-image:radial-gradient(circle at 20% 50%,#313244 0%,#1e1e2e 70%);
  padding-bottom:50px;
}
/* ─── header ─── */
.header{
  background:#11111b;padding:10px 24px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:2px solid #45475a;flex-shrink:0;
}
.header h1{font-size:15px;color:#89b4fa}
.header .stats{font-size:13px;color:#6c7086;display:flex;gap:16px}
.header .stats span{color:#a6e3a1}
/* ─── main area ─── */
.main{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden}
/* ─── stage map (default view) ─── */
.stage-map{
  display:flex;flex-wrap:wrap;gap:10px;justify-content:center;
  align-items:center;padding:40px 20px;
  position:absolute;inset:0;z-index:10;
  background:#1e1e2e;
  transition:opacity .4s;
}
.stage-map.hidden{opacity:0;pointer-events:none}
.stage-map h2{width:100%;text-align:center;font-size:18px;color:#89b4fa;margin-bottom:12px}
.stage-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:460px}
.stage-btn{
  width:56px;height:56px;border-radius:14px;
  border:2px solid #45475a;background:#181825;
  color:#6c7086;font-size:14px;font-weight:700;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
}
.stage-btn.locked{opacity:.35;cursor:not-allowed}
.stage-btn.cleared{background:#a6e3a1;color:#1e1e2e;border-color:#a6e3a1}
.stage-btn.current{background:#89b4fa;color:#1e1e2e;border-color:#89b4fa;transform:scale(1.08)}
.stage-btn:hover:not(.locked){transform:scale(1.05)}
/* ─── story-teller view ─── */
.story-view{
  position:absolute;inset:0;z-index:20;
  display:none;flex-direction:column;
  background:linear-gradient(180deg,#1e1e2e 0%,#11111b 100%);
}
.story-view.active{display:flex}
.story-bg{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:24px;position:relative;
}
.story-chapter-label{
  position:absolute;top:16px;left:24px;
  font-size:12px;color:#6c7086;letter-spacing:2px;
}
/* visual-novel style text box */
.story-textbox{
  background:rgba(17,17,27,.92);border-top:2px solid #45475a;
  padding:20px 28px;min-height:140px;max-height:200px;
  cursor:pointer;position:relative;
  backdrop-filter:blur(8px);
  display:flex;flex-direction:column;justify-content:center;
}
.story-textbox .line{
  font-size:17px;line-height:1.9;
  min-height:2em;color:#cdd6f4;
}
.story-textbox .line .cursor{
  display:inline-block;width:2px;height:1.1em;
  background:#89b4fa;margin-left:2px;
  vertical-align:text-bottom;animation:blink .8s infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.story-textbox .advance-hint{
  font-size:12px;color:#6c7086;text-align:right;
  margin-top:4px;opacity:0;transition:opacity .3s;
}
.story-textbox .advance-hint.show{opacity:1}
/* ─── quiz view ─── */
.quiz-view{
  position:absolute;inset:0;z-index:30;
  display:none;flex-direction:column;
  background:#1e1e2e;padding:32px 24px 60px;
  overflow-y:auto;
}
.quiz-view.active{display:flex}
.quiz-view .chapter-label{font-size:12px;color:#6c7086;margin-bottom:4px}
.quiz-view .question{
  font-size:17px;font-weight:700;line-height:1.7;margin-bottom:20px;
}
.quiz-view .options{display:flex;flex-direction:column;gap:10px;max-width:640px}
.quiz-view .opt{
  padding:14px 18px;border-radius:10px;
  background:#181825;border:2px solid #313244;
  color:#cdd6f4;font-size:15px;cursor:pointer;
  transition:all .2s;text-align:left;font-family:inherit;
}
.quiz-view .opt:hover:not(.disabled){border-color:#89b4fa;background:#313244}
.quiz-view .opt.correct{border-color:#a6e3a1;background:#1e3a2f;color:#a6e3a1}
.quiz-view .opt.wrong{border-color:#f38ba8;background:#3a1e2f;color:#f38ba8}
.quiz-view .opt.disabled{cursor:default;opacity:.7}
.quiz-view .result{
  margin-top:16px;padding:12px 16px;border-radius:10px;
  font-size:14px;display:none;max-width:640px;
}
.quiz-view .result.show{display:block}
.quiz-view .result.correct{background:#1e3a2f;color:#a6e3a1;border:1px solid #a6e3a1}
.quiz-view .result.wrong{background:#3a1e2f;color:#f38ba8;border:1px solid #f38ba8}
.quiz-view .next-btn{
  margin-top:16px;padding:12px 24px;border:none;
  border-radius:10px;background:#89b4fa;color:#1e1e2e;
  font-size:15px;font-weight:700;cursor:pointer;display:none;
  max-width:200px;transition:background .2s;
}
.quiz-view .next-btn:hover{background:#b4d0fb}
.quiz-view .input-area{margin-top:12px;display:flex;flex-direction:column;gap:4px;max-width:640px}
.quiz-view .input-hint{font-size:11px;color:#6c7086}
.quiz-view .text-input{
  padding:10px 14px;border-radius:8px;border:2px solid #45475a;
  background:#181825;color:#cdd6f4;font-size:15px;font-family:inherit;
  outline:none;transition:border-color .2s;width:100%;max-width:400px;
}
.quiz-view .text-input:focus{border-color:#89b4fa}
.quiz-view .text-input.disabled{opacity:.5;pointer-events:none}
.cert-banner{
  padding:10px 16px;background:#1e1e2e;border-top:1px solid #313244;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  font-size:12px;color:#6c7086;justify-content:center;
  position:fixed;bottom:0;left:0;right:0;z-index:100;
}
.cert-banner a{color:#89b4fa;text-decoration:none}
.cert-banner a:hover{text-decoration:underline}
.cert-banner-label{
  display:inline-block;padding:2px 8px;border-radius:4px;
  background:#313244;color:#a6adc8;font-size:10px;font-weight:700;

/* ─── completion ─── */
.completion-view{
  position:absolute;inset:0;z-index:40;
  display:none;flex-direction:column;align-items:center;justify-content:center;
  background:#1e1e2e;padding:24px;text-align:center;
}
.completion-view.active{display:flex}
.completion-view h2{font-size:26px;margin-bottom:12px;color:#a6e3a1}
.completion-view p{font-size:15px;color:#bac2de;margin-bottom:4px}
.completion-view .final-score{font-size:48px;font-weight:900;color:#f9e2af;margin:16px 0}
.completion-view .play-again{
  margin-top:24px;padding:14px 36px;border:none;
  border-radius:12px;background:#a6e3a1;color:#1e1e2e;
  font-size:16px;font-weight:700;cursor:pointer;

/* ─── responsiveness ─── */
@media(max-width:600px){
  .story-textbox{padding:16px 20px;min-height:120px}
  .story-textbox .line{font-size:15px}
  .quiz-view{padding:20px 16px}
}
</style>
</head>

// ═══════════════════════════════════════════════════════
//  STORYTELLER
// ═══════════════════════════════════════════════════════
class StoryTeller {
  constructor(el, lineEl, hintEl, labelEl) {
    this.el = el;
    this.lineEl = lineEl;
    this.hintEl = hintEl;
    this.labelEl = labelEl;
    this.lines = [];
    this.index = 0;
    this.callback = null;
    this._skip = false;
    this._busy = false;

    el.addEventListener('click', () => this.next());
    el.addEventListener('touchend', (e) => { e.preventDefault(); this.next(); });
    document.addEventListener('keydown', (e) => {
      if (!this.el.classList.contains('active')) return;
      if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowDown' || e.code === 'ArrowRight') {
        e.preventDefault();
        this.next();
      }
    });
  }

  setLines(lines) {
    this.lines = lines;
    return this;
  }

  start(callback) {
    this.callback = callback || null;
    this.index = 0;
    this.el.classList.add('active');
    this.hintEl.classList.remove('show');
    this._showLine();
  }

  stop() {
    this.el.classList.remove('active');
    this.lineEl.textContent = '';
    this.hintEl.classList.remove('show');
  }

  _showLine() {
    if (this.index >= this.lines.length) {
      this.stop();
      if (this.callback) this.callback();
      return;
    }
    const text = this.lines[this.index];
    this._skip = false;
    this._busy = true;
    this.hintEl.classList.remove('show');
    this._typewrite(text, () => {
      this._busy = false;
      this.hintEl.classList.add('show');
    });
  }

  _typewrite(text, done) {
    this.lineEl.textContent = '';
    let i = 0;
    const chars = [...text];
    const speed = 24;

    const tick = () => {
      if (this._skip) {
        this.lineEl.textContent = text;
        done();
        return;
      }
      if (i < chars.length) {
        this.lineEl.textContent += chars[i];
        i++;
        // vary speed slightly for natural feel
        const delay = chars[i-1].match(/[。！？」「\n]/) ? speed * 6 : speed;
        setTimeout(tick, delay);
      } else {
        done();
      }
    };
    tick();
  }

  next() {
    if (this._busy) {
      this._skip = true;
      return;
    }
    this.index++;
    this._showLine();
  }
}

// ═══════════════════════════════════════════════════════
//  GAME
// ═══════════════════════════════════════════════════════
const Game = {
  unlocked:0,
  cleared:[],
  answers:{},
  currentChapter:-1,
  currentQ:0,

  init(){
    this.unlocked=parseInt(localStorage.getItem('gk_unlocked')||'0');
    this.cleared=JSON.parse(localStorage.getItem('gk_cleared')||'[]');
    this.answers=JSON.parse(localStorage.getItem('gk_answers')||'{}');
    // dom refs
    this.stageMap=document.getElementById('stageMap');
    this.stageGrid=document.getElementById('stageGrid');
    this.storyView=document.getElementById('storyView');
    this.storyChapterLabel=document.getElementById('storyChapterLabel');
    this.storyLine=document.getElementById('storyLine');
    this.advanceHint=document.getElementById('advanceHint');
    this.quizView=document.getElementById('quizView');
    this.quizChapterLabel=document.getElementById('quizChapterLabel');
    this.questionText=document.getElementById('questionText');
    this.optionsContainer=document.getElementById('optionsContainer');
    this.textInput=document.getElementById('textInput');
    this.inputArea=document.getElementById('inputArea');
    this.resultBox=document.getElementById('resultBox');
    this.nextBtn=document.getElementById('nextBtn');
    this.completionView=document.getElementById('completionView');
    this.finalScore=document.getElementById('finalScore');
    this.clearCount=document.getElementById('clearCount');
    this.scoreDisplay=document.getElementById('scoreDisplay');

    // story-teller
    this.teller=new StoryTeller(
      this.storyView,this.storyLine,this.advanceHint,this.storyChapterLabel
    );

    this.nextBtn.addEventListener('click',()=>this.nextQuestion());
    document.addEventListener('keydown',(e)=>{
      if(this.stageMap.classList.contains('hidden')&&!this.quizView.classList.contains('active')){
        if(e.code==='Space'||e.code==='Enter'){e.preventDefault();this.teller.next();}
        return;
      }
      if(!this.quizView.classList.contains('active')&&!this.stageMap.classList.contains('hidden')){
        if(e.code==='ArrowRight'||e.code==='Enter'){
          const unlocked=this.stageGrid.querySelectorAll('.current:not(.locked)');
          if(unlocked.length>0)unlocked[0].click();
        }
        return;
      }
      if(this.quizView.classList.contains('active')){
        const qData=QUIZ[this.currentChapter]?.[this.currentQ];
        if(!qData)return;
        if(e.code==='Escape'){this.quizView.classList.remove('active');this.stageMap.classList.remove('hidden');return;}
        if(this.nextBtn.style.display!='none'&&(e.code==='Space'||e.code==='Enter')){
          e.preventDefault();this.nextBtn.click();return;
        }
        const key=`${this.currentChapter}-${this.currentQ}`;
        if(this.answers[key]!==undefined)return;
        const num=parseInt(e.key);
        if(num>=1&&num<=qData.opts.length){
          const btns=this.optionsContainer.querySelectorAll('.opt');
          if(btns[num-1])btns[num-1].click();
        }
      }
    });
    this.render();
  },

  save(){
    localStorage.setItem('gk_unlocked',this.unlocked);
    localStorage.setItem('gk_cleared',JSON.stringify(this.cleared));
    localStorage.setItem('gk_answers',JSON.stringify(this.answers));
  },

  getScore(){
    let c=0;for(let k in this.answers)if(this.answers[k])c++;
    return c;
  },

  render(){
    this.stageGrid.innerHTML='';
    const total=STORY.length;
    for(let i=0;i<total;i++){
      const btn=document.createElement('button');
      btn.className='stage-btn';
      if(this.cleared.includes(i)){
        btn.classList.add('cleared');
        btn.textContent='✓';
      }else if(i<=this.unlocked){
        btn.classList.add('current');
        btn.textContent=i+1;
      }else{
        btn.classList.add('locked');
        btn.textContent='🔒';
      }
      if(i<=this.unlocked)btn.onclick=()=>this.startChapter(i);
      this.stageGrid.appendChild(btn);
    }
    this.clearCount.textContent=this.cleared.length;
    this.scoreDisplay.textContent=this.getScore();
    if(this.cleared.length===total){
      this.completionView.classList.add('active');
      this.finalScore.textContent=`${this.getScore()} / ${total*3}`;
    }
  },

  startChapter(idx){
    if(idx>this.unlocked)return;
    this.currentChapter=idx;
    this.currentQ=0;
    this.quizView.classList.remove('active');
    this.completionView.classList.remove('active');
    this.stageMap.classList.add('hidden');

    const ch=STORY[idx];
    this.storyChapterLabel.textContent=ch.title;
    this.teller.setLines(ch.lines);
    this.teller.start(()=>{
      this.startQuiz();
    });
  },

  startQuiz(){
    this.currentQ=0;
    this.quizView.classList.add('active');
    this.showQuestion();
  },

  showQuestion(){
    const qData=QUIZ[this.currentChapter][this.currentQ];
    if(!qData){this.chapterCleared();return;}
    this.quizChapterLabel.textContent=STORY[this.currentChapter].title;
    this.questionText.textContent=qData.q;
    this.optionsContainer.innerHTML='';
    this.resultBox.classList.remove('show','correct','wrong');
    this.nextBtn.style.display='none';
    this.textInput.value='';this.textInput.disabled=false;
    this.inputArea.style.display='';

    const key=`${this.currentChapter}-${this.currentQ}`;
    const prev=this.answers[key];

    qData.opts.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='opt';
      btn.textContent=`${i+1}. ${opt}`;
      btn.onclick=()=>this.selectAnswer(i,btn);
      if(prev!==undefined){
        btn.classList.add('disabled');
        if(i===qData.ans)btn.classList.add('correct');
        else if(i===prev)btn.classList.add('wrong');
      }
      this.optionsContainer.appendChild(btn);
    });

    this.textInput.onkeydown=(e)=>{
      if(e.code!=='Enter'||this.textInput.disabled)return;
      e.preventDefault();
      const val=this.textInput.value.trim();
      if(!val)return;
      const correctIdx=qData.opts.findIndex(o=>o.includes(val)||val.includes(o));
      if(correctIdx>=0){this.selectAnswer(correctIdx,document.querySelectorAll('.opt')[correctIdx]);}
      else{this.selectAnswer(-1,null,val);}
    };

    if(prev!==undefined){
      this.resultBox.classList.add('show',prev===qData.ans?'correct':'wrong');
      this.resultBox.textContent=prev===qData.ans?'✅ 正解！':`❌ 不正解。「${qData.opts[qData.ans]}」`;
      this.nextBtn.style.display='block';
      const ch=QUIZ[this.currentChapter];
      this.nextBtn.textContent=this.currentQ<ch.length-1?'次の問題 →':'章クリア！';
    }else{
      setTimeout(()=>this.textInput.focus(),100);
    }
  },

  selectAnswer(idx,btn,rawVal){
    const qData=QUIZ[this.currentChapter][this.currentQ];
    const key=`${this.currentChapter}-${this.currentQ}`;
    if(this.answers[key]!==undefined)return;
    const correct=idx===qData.ans;
    this.answers[key]=correct;
    this.textInput.disabled=true;
    this.textInput.classList.add('disabled');
    if(btn){btn.classList.add(correct?'correct':'wrong');}
    document.querySelectorAll('.opt').forEach(b=>b.classList.add('disabled'));
    const correctBtn=document.querySelectorAll('.opt')[qData.ans];
    if(correctBtn)correctBtn.classList.add('correct');
    this.resultBox.classList.add('show',correct?'correct':'wrong');
    this.resultBox.textContent=correct?'✅ 正解！':(rawVal?`❌「${rawVal}」→ 正解は「${qData.opts[qData.ans]}」`:`❌ 不正解。「${qData.opts[qData.ans]}」`);
    const ch=QUIZ[this.currentChapter];
    this.nextBtn.style.display='block';
    this.nextBtn.textContent=this.currentQ<ch.length-1?'次の問題 →':'章クリア！';
    this.save();
    this.render();
  },

  nextQuestion(){
    const ch=QUIZ[this.currentChapter];
    this.currentQ++;
    if(this.currentQ>=ch.length){this.chapterCleared();}
    else{this.showQuestion();}
  },

  chapterCleared(){
    const idx=this.currentChapter;
    if(!this.cleared.includes(idx))this.cleared.push(idx);
    if(idx+1<STORY.length&&idx+1>this.unlocked)this.unlocked=idx+1;
    this.save();
    this.render();
    this.quizView.classList.remove('active');
    this.stageMap.classList.remove('hidden');
  },

  reset(){
    localStorage.removeItem('gk_unlocked');
    localStorage.removeItem('gk_cleared');
    localStorage.removeItem('gk_answers');
    this.unlocked=0;this.cleared=[];this.answers={};
    this.completionView.classList.remove('active');
    this.quizView.classList.remove('active');
    this.stageMap.classList.remove('hidden');
    this.render();
  }
};

// ═══════════════════════════════════════════════════════
//  START
// ═══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>Game.init());
</script>
