<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ロボット犬で学ぶ Java — 教科書プレイグラウンド</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header-bar">
  <h1>🐕 教科書プレイグラウンド</h1>
  <span class="subtitle">ロボット犬で学ぶ Java & ロボティクス</span>
</div>

<div class="toolbar">
  <label>サンプルコードを読み込む：
    <select id="sampleSelect">
      <option value="pubsub">[第10課] ROS 風 pub/sub 通信</option>
      <option value="polymorphism">[第6課] 多態性（ポリモーフィズム）</option>
      <option value="brain">[第7課] 頭脳差し替え（戦略パターン）</option>
      <option value="agent">[第8課] AI エージェント</option>
      <option value="worldmodel">[第9課] 世界モデル</option>
      <option value="hello">[第0課] Hello World</option>
    </select>
  </label>
  <button id="runButton">▶ 実行</button>
  <button id="clearButton">クリア</button>
</div>

<div class="container">
  <textarea id="code" spellcheck="false"></textarea>
  <div class="right">
    <pre id="output">コードを書いて「実行」ボタンを押すと結果がここに表示されます。</pre>
  </div>
</div>

<script src="teavm/teavm.js"></script>
<script src="main.js"></script>
</body>
</html>
